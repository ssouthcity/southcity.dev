backend:
  name: git-gateway
  branch: main

media_folder: "static/img"
public_folder: "/img"

collections:
  - name: "blog"
    label: "Blog"
    folder: "content/blog"
    path: "{{slug}}/index"
    media_folder: ""
    public_folder: ""
    create: true
    fields:
      - label: "Title"
        name: "title"
        widget: "string"

      - label: "Publish Date"
        name: "date"
        widget: "datetime"

      - label: "Featured Image"
        name: "thumbnail"
        widget: "image"

      - label: "Tags"
        name: "tags"
        widget: "list"

      - label: "Body"
        name: "body"
        widget: "markdown"

  - name: "portfolio"
    label: "Portfolio"
    folder: "content/portfolio"
    create: true
    fields:
      - label: "Title"
        name: "title"
        widget: "string"

      - label: "Description"
        name: "body"
        widget: "text"

      - label: "Links"
        name: "links"
        widget: "list"
        summary: "{{fields.name}} {{fields.url}}"
        fields:
          - label: "Name"
            name: "name"
            widget: "string"

          - label: "URL"
            name: "url"
            widget: "string"
