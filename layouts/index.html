{{ define "main" }}
<main class="home | stack">
    <header>
        <h1>Stian Sørby</h1>
        <p>Fullstack Developer</p>
    </header>
    <img class="card" src="https://picsum.photos/600" alt="">
    <nav>
        <ul class="cluster" role="list">
            {{ range .Pages }}
            <li>
                <a class="btn" href="{{ .RelPermalink }}">
                    {{ .Title }}
                </a>
            </li>
            {{ end }}
        </ul>
    </nav>
</main>
{{ end }}
