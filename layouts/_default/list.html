{{ define "main" }}
<main class="flow">
    <h1>My Blog</h1>
    <ul role="list" class="flow">
        {{ range .Pages }}
            <li>
                <article class="card | flow">
                    <h2>{{ .Title }}</h2>
                    <p>{{ substr .RawContent 0 300 }}...</p>
                    <a href="{{ .RelPermalink }}">
                        Read article
                    </a>
                </article>
            </li>
        {{ end }}
    </ul>
</main>
{{ end }}
