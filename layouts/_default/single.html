{{ define "main" }}
<main>
    <time datetime="{{ .Params.Date.Format "2006-01-02" }}">{{ .Params.Date.Format "2006/01/02" }}</time>
    <h1>{{ .Params.Title }}</h1>
    <ul>
        {{ range (.GetTerms "tags") }}
            <li>
                <a href="{{ .Permalink }}">
                    {{ .LinkTitle }}
                </a>
            </li>
        {{ end }}
    </ul>
    {{ .Content }}
</main>
{{ end }}
