{{ define "main" }}
<main class="blog-post">
    <header>
        <time datetime="{{ .Params.Date.Format "2006-01-02" }}">{{ .Params.Date.Format "2006/01/02" }}</time>
        <h1>{{ .Title }}</h1>
        <ul class="side-by-side" role="list">
            {{ range (.GetTerms "tags") }}
            <li class="tag">
                <a href="{{ .RelPermalink }}">
                    {{ .LinkTitle }}
                </a>
            </li>
            {{ end }}
        </ul>
    </header>
    <div class="flow">
        {{ .Content }}
    </div>
</main>
{{ end }}
